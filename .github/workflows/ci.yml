name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (native napi engine + TypeScript)
        run: pnpm build

      - name: Test
        # Allocate a pseudo-TTY: the native engine queries the terminal size
        # (TIOCGWINSZ), which fails with EAGAIN on a headless runner without a tty.
        run: script -e -q -c "pnpm test" /dev/null

      - name: Lint
        run: pnpm lint
