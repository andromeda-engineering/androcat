name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (native napi engine + TypeScript)
        run: pnpm build

      - name: Test
        # The native engine queries the terminal size (TIOCGWINSZ). A headless
        # runner has no tty, so allocate a pseudo-tty via script(1) and give it a
        # concrete size with stty (a bare pty reports 0x0, failing size > 0 checks).
        run: script -e -q -c "stty rows 24 cols 80; pnpm test" /dev/null

      - name: Lint
        run: pnpm lint
